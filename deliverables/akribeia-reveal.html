<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#04060A;}
  #stage{position:relative;width:760px;height:440px;background:#04060A;overflow:hidden;}
  #c{position:absolute;inset:0;}
  #wm{position:absolute;left:0;right:0;top:330px;text-align:center;font-family:'Chakra Petch',Arial,sans-serif;font-weight:600;font-size:25px;letter-spacing:.22em;color:#EAEDF1;padding-left:.22em;opacity:0;}
  #wm .sub{display:block;margin-top:7px;font-family:'Chakra Petch';font-weight:500;font-size:9.5px;letter-spacing:.34em;color:#5A6573;}
</style></head><body>
<div id="stage"><canvas id="c" width="760" height="440"></canvas>
<div id="wm">AKRIBEIA</div></div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d'), wm=document.getElementById('wm');
const W=760,H=440, Cx=380, Cy=196;
const clamp=(x,a=0,b=1)=>x<a?a:x>b?b:x;
const lerp=(a,b,t)=>a+(b-a)*t;
const eio=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
const ei=t=>t*t;
function R(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// ── starfield ──
const sr=R(7);
const STARS=Array.from({length:130},()=>({x:sr()*W,y:sr()*H,r:sr()*1.1+0.2,a:sr()*0.5+0.1,ph:sr()*6.28}));

// ── the Great Bear constellation ──
const BEAR=[[250,150],[278,138],[272,118],[300,140],[330,135],[375,128],[425,134],[462,146],[488,132],[335,175],[330,210],[352,178],[358,212],[388,160],[440,178],[432,214],[458,180],[470,214]];
const BEDGE=[[0,1],[1,2],[1,3],[3,4],[4,5],[5,6],[6,7],[7,8],[4,9],[9,10],[4,11],[11,12],[5,13],[6,14],[14,15],[6,16],[16,17],[13,14]];

// ── final mark: triangulation to an exact point ──
const Rt=92;
const V=[[Cx,Cy-Rt],[Cx+Rt*0.866,Cy+Rt*0.5],[Cx-Rt*0.866,Cy+Rt*0.5]];
const TARGETS=[];
for(let e=0;e<3;e++){const a=V[e],b=V[(e+1)%3];for(let k=0;k<14;k++)TARGETS.push([lerp(a[0],b[0],k/14),lerp(a[1],b[1],k/14)]);}
for(let e=0;e<3;e++){const a=V[e];for(let k=1;k<=26;k++)TARGETS.push([lerp(a[0],Cx,k/27),lerp(a[1],Cy,k/27)]);}
const NP=TARGETS.length;

// ── particles (seeded) ──
const pr=R(99);
const P=Array.from({length:NP},(_,i)=>({dir:pr()*6.2832,spd:0.55+pr()*0.9,att:i%3,oR:15+pr()*30,oA:pr()*6.2832,oS:5+pr()*7.5,tx:TARGETS[i][0],ty:TARGETS[i][1],tw:pr()*6.28}));

function attractor(att,p){
  const ra=lerp(150,16,clamp((p-0.24)/0.40));
  const ang=(6.2832*att/3)+p*4.6+0.85*Math.sin(p*6+att*2.1);
  return [Cx+ra*Math.cos(ang), Cy+ra*0.62*Math.sin(ang)];
}
function ppos(pt,p){
  const A=attractor(pt.att,p);
  const oa=pt.oA+p*pt.oS;
  const orb=[A[0]+pt.oR*Math.cos(oa), A[1]+pt.oR*Math.sin(oa)];
  const ex=clamp((p-0.20)/0.16), er=ex*130*pt.spd;
  const explo=[Cx+Math.cos(pt.dir)*er, Cy+Math.sin(pt.dir)*er];
  const b=clamp((p-0.30)/0.12);
  const base=[lerp(explo[0],orb[0],b), lerp(explo[1],orb[1],b)];
  const c=eio(clamp((p-0.62)/0.24));
  return [lerp(base[0],pt.tx,c), lerp(base[1],pt.ty,c)];
}
function glow(x,y,r,col,a){const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,col.replace('A',a));g.addColorStop(1,col.replace('A',0));ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,6.2832);ctx.fill();}

function draw(p){
  ctx.globalCompositeOperation='source-over';
  const bg=ctx.createRadialGradient(Cx,Cy,0,Cx,Cy,460);
  bg.addColorStop(0,'#0A1322');bg.addColorStop(0.5,'#060B16');bg.addColorStop(1,'#03050A');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';
  for(const s of STARS){const a=s.a*(0.55+0.45*Math.sin(p*7+s.ph));ctx.fillStyle=`rgba(180,205,240,${a})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.2832);ctx.fill();}

  // BEAR
  let ba=p<0.14?1:p<0.20?1-(p-0.14)/0.06:0;
  if(ba>0){
    const ct=ei(clamp((p-0.14)/0.06));
    const pos=BEAR.map(b=>[lerp(b[0],Cx,ct),lerp(b[1],Cy,ct)]);
    ctx.strokeStyle=`rgba(150,185,235,${0.32*ba})`;ctx.lineWidth=1;
    for(const[a,b]of BEDGE){ctx.beginPath();ctx.moveTo(pos[a][0],pos[a][1]);ctx.lineTo(pos[b][0],pos[b][1]);ctx.stroke();}
    pos.forEach((q,i)=>{const tw=0.6+0.4*Math.sin(p*9+i);glow(q[0],q[1],5,'rgba(170,205,255,A)',0.5*ba*tw);ctx.fillStyle=`rgba(234,242,255,${ba})`;ctx.beginPath();ctx.arc(q[0],q[1],1.6,0,6.2832);ctx.fill();});
    if(p<0.135){ctx.fillStyle=`rgba(120,150,190,${0.5*ba})`;ctx.font='10px Arial';ctx.textAlign='center';ctx.fillText('the great bear',Cx,Cy+150);}
  }

  // BIG BANG
  if(p>0.165&&p<0.40){
    const ca=p<0.235?(p-0.165)/0.07:clamp(1-(p-0.235)/0.13);
    glow(Cx,Cy,90,'rgba(180,220,255,A)',0.9*ca);
    glow(Cx,Cy,34,'rgba(240,250,255,A)',ca);
    if(p>0.205){const rr=(p-0.205)*1000,ra=clamp(1-(p-0.205)/0.15);ctx.strokeStyle=`rgba(160,210,255,${ra*0.8})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(Cx,Cy,rr,0,6.2832);ctx.stroke();}
  }

  // PARTICLES
  if(p>=0.195){
    const land=clamp((p-0.78)/0.12);
    for(const pt of P){
      const q=ppos(pt,p);const a=clamp((p-0.20)/0.05);
      const tw=0.7+0.3*Math.sin(p*8+pt.tw);
      glow(q[0],q[1],3.4+land*1.5,'rgba(150,205,255,A)',0.5*a*tw);
      ctx.fillStyle=`rgba(${lerp(150,235,land)},${lerp(205,245,land)},255,${a})`;
      ctx.beginPath();ctx.arc(q[0],q[1],1.1+land*0.5,0,6.2832);ctx.fill();
    }
  }

  // THREE BODIES
  if(p>0.24&&p<0.66){
    const aa=clamp((p-0.24)/0.06)*clamp((0.66-p)/0.08);
    for(let k=0;k<3;k++){const A=attractor(k,p);glow(A[0],A[1],26,'rgba(120,180,255,A)',0.5*aa);ctx.strokeStyle=`rgba(190,225,255,${0.7*aa})`;ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(A[0],A[1],6,0,6.2832);ctx.stroke();}
    if(p>0.30&&p<0.6){ctx.fillStyle=`rgba(110,140,180,${0.6*aa})`;ctx.font='9px Arial';ctx.textAlign='center';ctx.fillText('three-body',Cx,Cy+155);}
  }

  // FINAL — triangulation lands
  if(p>0.80){
    const fa=eio(clamp((p-0.80)/0.14));
    ctx.strokeStyle=`rgba(225,235,248,${0.85*fa})`;ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(V[0][0],V[0][1]);ctx.lineTo(V[1][0],V[1][1]);ctx.lineTo(V[2][0],V[2][1]);ctx.closePath();ctx.stroke();
    ctx.strokeStyle=`rgba(150,200,255,${0.5*fa})`;ctx.lineWidth=1;
    for(let k=0;k<3;k++){ctx.beginPath();ctx.moveTo(V[k][0],V[k][1]);ctx.lineTo(Cx,Cy);ctx.stroke();}
    for(let k=0;k<3;k++){ctx.fillStyle=`rgba(234,242,255,${fa})`;ctx.beginPath();ctx.arc(V[k][0],V[k][1],2.6,0,6.2832);ctx.fill();}
    glow(Cx,Cy,16+6*Math.sin(p*10),'rgba(210,235,255,A)',0.9*fa);
    ctx.fillStyle=`rgba(255,255,255,${fa})`;ctx.beginPath();ctx.arc(Cx,Cy,3,0,6.2832);ctx.fill();
  }
  wm.style.opacity=clamp((p-0.84)/0.12);
}

const Q=new URLSearchParams(location.search);
async function start(){
  try{await document.fonts.load('600 25px "Chakra Petch"');await document.fonts.ready;}catch(e){}
  if(Q.has('f')){const n=+Q.get('n')||48;draw(clamp((+Q.get('f'))/(n-1)));}
  else{const D=7000;let t0=null;const loop=(ts)=>{if(t0==null)t0=ts;let p=((ts-t0)%D)/D;draw(p);requestAnimationFrame(loop);};requestAnimationFrame(loop);}
}
start();
</script></body></html>
