name: Backtest Optimizer H-Trail (Trailing Stop)
# Tests trailing stop variant on top of H1B winning baseline.
#
# H1B locked-in: stop=2x ATR, target=3x ATR, hold=14 days
# H-Trail: same stop=2x ATR, but NO fixed target. Instead trail at 1.5x ATR
# below running high close once trade is up by 1x ATR (in profit).
#
# Hypothesis: lets winners run during bull markets where fixed +6% targets
# cap upside. Should improve performance especially in 2009, 2019, 2024
# (strong bull years where H1B underperformed SPY).

on:
  workflow_dispatch:

jobs:
  backtest-h-trail:
    name: H-Trail Trailing Stop Variant
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests
      - name: Run trailing stop backtest
        env:
          VARIANT_NAME: "h_trail"
          STOP_ATR: "2.0"
          TARGET_ATR: "3.0"
          HOLD_DAYS: "14"
          MIN_SCORE: "50"
          TOP_N: "10"
          START_YEAR: "2005"
          TRAIN_END_YEAR: "2019"
          USE_TRAILING_STOP: "true"
          TRAIL_ATR_MULT: "1.5"
        run: |
          echo "Starting H-Trail backtest at $(date)"
          echo "Config: stop=2x ATR, no fixed target, trailing stop at 1.5x ATR below running high"
          python build_backtest_optimizer.py
          echo "Completed at $(date)"
      - name: Verify output
        run: |
          if [ ! -f "backtest_variant_h_trail.json" ]; then
            echo "ERROR: output not created"
            exit 1
          fi
          ls -lh backtest_variant_h_trail.json
      - name: Commit and push
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add backtest_variant_h_trail.json
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: H-Trail backtest results (trailing stop variant)"
          git fetch origin main
          git rebase origin/main || (git rebase --abort 2>/dev/null || true)
          git push origin main
