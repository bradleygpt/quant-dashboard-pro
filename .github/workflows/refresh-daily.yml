name: Daily Fundamentals Refresh

# Runs at 3:00 AM UTC weeknights (10:00 PM ET previous day)
# Refreshes fundamentals_cache.json with latest prices, momentum, fundamentals
on:
  schedule:
    - cron: '0 3 * * 2-6'  # Tue-Sat at 3 AM UTC = Mon-Fri 10 PM ET
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas yfinance requests

      - name: Run fundamentals cache builder
        run: |
          echo "Starting fundamentals cache refresh at $(date)"
          python build_cache.py
          echo "Completed at $(date)"

      - name: Verify cache file was created
        run: |
          if [ ! -f "fundamentals_cache.json" ]; then
            echo "ERROR: fundamentals_cache.json was not created"
            exit 1
          fi
          ls -lh fundamentals_cache.json
          echo "Cache size: $(wc -c < fundamentals_cache.json) bytes"

      - name: Commit and push updated cache
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add fundamentals_cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily fundamentals refresh $(date -u +%Y-%m-%d)"
            git push
            echo "Pushed updated cache. Streamlit Cloud will redeploy automatically."
          fi
