name: Daily Fundamentals Refresh - Evening

# Runs at 11:00 PM ET (Sun-Fri during EDT) - captures end-of-day data
# Coverage: Mon-Sat at 3 AM UTC = Sun-Fri 11 PM ET
on:
  schedule:
    - cron: '0 3 * * 1-6'  # Mon-Sat at 3 AM UTC = Sun-Fri 11 PM ET (covers all 5 trading day closes)
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  refresh-cache-evening:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas yfinance requests

      - name: Run fundamentals cache builder
        run: |
          echo "Starting fundamentals cache refresh at $(date)"
          python build_cache.py
          echo "Completed at $(date)"

      - name: Verify cache file was created
        run: |
          if [ ! -f "fundamentals_cache.json" ]; then
            echo "ERROR: fundamentals_cache.json was not created"
            exit 1
          fi
          ls -lh fundamentals_cache.json
          echo "Cache size: $(wc -c < fundamentals_cache.json) bytes"

      - name: Commit and push updated cache
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add fundamentals_cache.json
          # Show what we're about to commit (visible in logs)
          echo "=== Status before commit ==="
          git status
          if git diff --staged --quiet; then
            echo "No changes detected. Nothing to commit."
            exit 0
          fi
          git commit -m "chore: evening fundamentals refresh $(date -u +%Y-%m-%d)"
          # Use --rebase --autostash to handle any concurrent pushes safely
          git fetch origin main
          git rebase origin/main || (echo "Rebase failed, attempting force-with-lease push"; git rebase --abort 2>/dev/null || true)
          # Push and show result
          echo "=== Pushing ==="
          git push origin main
          echo "=== Done ==="
