name: Daily Fundamentals Refresh - Morning

# Runs at 10:00 AM ET weekdays (after market open chaos has settled)
# Captures overnight gaps and early morning trading action
# Complements the evening 11 PM ET run with a morning snapshot
on:
  schedule:
    - cron: '0 14 * * 1-5'  # 14:00 UTC = 10:00 AM ET weekdays (during EDT)
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  refresh-cache-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas yfinance requests

      - name: Run fundamentals cache builder
        run: |
          echo "Starting morning fundamentals cache refresh at $(date)"
          python build_cache.py
          echo "Completed at $(date)"

      - name: Verify cache file was created
        run: |
          if [ ! -f "fundamentals_cache.json" ]; then
            echo "ERROR: fundamentals_cache.json was not created"
            exit 1
          fi
          ls -lh fundamentals_cache.json
          echo "Cache size: $(wc -c < fundamentals_cache.json) bytes"

      - name: Commit and push updated cache
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add fundamentals_cache.json
          echo "=== Status before commit ==="
          git status
          if git diff --staged --quiet; then
            echo "No changes detected. Nothing to commit."
            exit 0
          fi
          git commit -m "chore: morning fundamentals refresh $(date -u +%Y-%m-%d)"
          git fetch origin main
          git rebase origin/main || (echo "Rebase failed, attempting force-with-lease push"; git rebase --abort 2>/dev/null || true)
          echo "=== Pushing ==="
          git push origin main
          echo "=== Done ==="
