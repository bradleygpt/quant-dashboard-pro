name: Swing Trader Backtest
# Runs weekly on Sunday at 5 AM UTC (1 AM ET) — heavy compute, runs when nothing else is happening
# First run takes 2-3 hours; cached after that for incremental updates

on:
  schedule:
    - cron: '0 5 * * 0'  # Sunday 5 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # Up to 6 hours (max GitHub Actions allows)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run backtest
        run: |
          echo "Starting backtest at $(date)"
          python build_backtest.py
          echo "Completed at $(date)"

      - name: Verify backtest output
        run: |
          if [ ! -f "backtest_results.json" ]; then
            echo "ERROR: backtest_results.json was not created"
            exit 1
          fi
          ls -lh backtest_results.json
          echo "File size: $(wc -c < backtest_results.json) bytes"

      - name: Commit and push results
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add backtest_results.json
          if git diff --staged --quiet; then
            echo "No changes detected"
            exit 0
          fi
          git commit -m "chore: backtest results $(date -u +%Y-%m-%d)"
          git fetch origin main
          git rebase origin/main || (git rebase --abort 2>/dev/null || true)
          git push origin main
