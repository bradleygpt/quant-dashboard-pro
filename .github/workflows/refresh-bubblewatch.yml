name: Bubble-Watch Monthly Snapshot
# Monthly (7th, 15:00 UTC — after month-end 10-Q amendments settle and after the
# manual-macro refresh on the 5th). Data layer only (handoff §4.1): SEC capex +
# yfinance valuations + FRED HY OAS -> bubblewatch/snapshots/<YYYY-MM>.json and a
# commentary diff-dossier in bubblewatch/queue/. Commentary itself is generated in
# Claude Code (§4.2) — this job never calls an LLM. Non-blocking.

on:
  schedule:
    - cron: '0 15 7 * *'   # 15:00 UTC on the 7th of each month
  workflow_dispatch:

jobs:
  bubblewatch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Build snapshot
        continue-on-error: true
        run: |
          echo "Starting bubblewatch snapshot at $(date)"
          python build_bubblewatch_snapshot.py || echo "snapshot failed (non-blocking)"

      - name: Commit snapshot + queue dossier
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add bubblewatch/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes detected. Nothing to commit."
            exit 0
          fi
          git commit -m "chore: bubblewatch snapshot $(date -u +%Y-%m)"
          # push-race guard (required on all main-pushing workflows in this repo)
          git fetch origin main
          git rebase origin/main || (echo "Rebase failed"; git rebase --abort 2>/dev/null || true)
          git push origin main
